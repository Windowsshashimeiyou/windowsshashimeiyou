<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Windows啥事没有</title>
    <style>
        /* ===== 全局重置 & 字体 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* 从顶部开始，允许滚动 */
            background: linear-gradient(145deg, #0b0e1a 0%, #1a1f33 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 40px 20px 60px;
            position: relative;
            overflow-x: hidden;
            gap: 40px; /* 区块间距 */
        }

        /* ===== 背景装饰光晕 ===== */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
            animation: floatGlow 12s ease-in-out infinite alternate;
        }
        body::before {
            width: 500px;
            height: 500px;
            background: #4a6cf7;
            top: -100px;
            left: -100px;
        }
        body::after {
            width: 600px;
            height: 600px;
            background: #7b4af7;
            bottom: -150px;
            right: -150px;
            animation-delay: 4s;
        }

        @keyframes floatGlow {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(60px, 40px) scale(1.2);
            }
        }

        /* ===== 通用卡片样式 ===== */
        .card {
            position: relative;
            z-index: 1;
            max-width: 620px;
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border-radius: 48px;
            padding: 48px 40px 40px;
            box-shadow:
                0 40px 80px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.06) inset,
                0 0 0 1px rgba(255, 255, 255, 0.03);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.5s ease;
            animation: cardEntrance 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .card:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow:
                0 60px 100px rgba(0, 0, 0, 0.7),
                0 0 0 1px rgba(255, 255, 255, 0.10) inset;
        }

        @keyframes cardEntrance {
            0% {
                opacity: 0;
                transform: translateY(60px) scale(0.94);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ===== 标题 ===== */
        .main-title {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #ffffff;
            text-shadow: 0 2px 20px rgba(74, 108, 247, 0.25);
            margin-bottom: 28px;
            position: relative;
            display: inline-block;
            padding: 0 8px;
        }

        .main-title::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #4a6cf7, #7b4af7, transparent);
            border-radius: 4px;
            animation: titleUnderline 3s ease-in-out infinite;
        }

        @keyframes titleUnderline {
            0%,
            100% {
                width: 30%;
                opacity: 0.5;
            }
            50% {
                width: 80%;
                opacity: 1;
            }
        }

        /* ===== 副标题（仙境生存系列） ===== */
        .sub-title {
            font-size: 2.0rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: #ffffff;
            text-shadow: 0 2px 15px rgba(123, 74, 247, 0.20);
            margin-bottom: 28px;
            position: relative;
            display: inline-block;
            padding: 0 8px;
        }

        .sub-title::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #7b4af7, #4a6cf7, transparent);
            border-radius: 4px;
            animation: subUnderline 4s ease-in-out infinite;
        }

        @keyframes subUnderline {
            0%,
            100% {
                width: 20%;
                opacity: 0.4;
            }
            50% {
                width: 70%;
                opacity: 1;
            }
        }

        /* ===== 图片容器 ===== */
        .image-wrapper {
            position: relative;
            border-radius: 32px;
            overflow: hidden;
            margin-bottom: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.2);
            transition: box-shadow 0.5s ease;
            animation: imageFloat 6s ease-in-out infinite;
        }

        .image-wrapper:hover {
            box-shadow: 0 30px 70px rgba(74, 108, 247, 0.25);
        }

        @keyframes imageFloat {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        .image-wrapper img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 32px;
            transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1),
                filter 0.6s ease;
            filter: brightness(0.95) saturate(1.05);
            animation: imageFade 1s ease 0.3s both;
        }

        .image-wrapper:hover img {
            transform: scale(1.03);
            filter: brightness(1.03) saturate(1.1);
        }

        @keyframes imageFade {
            0% {
                opacity: 0;
                transform: scale(0.96);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .image-wrapper::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 32px;
            background: linear-gradient(135deg,
                    rgba(74, 108, 247, 0.08) 0%,
                    transparent 50%,
                    rgba(123, 74, 247, 0.06) 100%);
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        .image-wrapper:hover::after {
            opacity: 0.5;
        }

        /* ===== 按钮样式（共用） ===== */
        .btn-link {
            display: inline-block;
            text-decoration: none;
            padding: 18px 48px;
            border-radius: 60px;
            background: linear-gradient(135deg, #4a6cf7, #7b4af7);
            color: #fff;
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            box-shadow: 0 12px 40px rgba(74, 108, 247, 0.35);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.4s ease,
                background 0.4s ease;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            animation: btnPulse 2.8s ease-in-out infinite;
        }

        .btn-link::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 60px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), transparent 60%);
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .btn-link:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 60px rgba(74, 108, 247, 0.5);
            background: linear-gradient(135deg, #5a7cff, #8a5aff);
        }

        .btn-link:active {
            transform: scale(0.96);
            box-shadow: 0 8px 30px rgba(74, 108, 247, 0.3);
        }

        @keyframes btnPulse {
            0%,
            100% {
                box-shadow: 0 12px 40px rgba(74, 108, 247, 0.35);
            }
            50% {
                box-shadow: 0 12px 60px rgba(74, 108, 247, 0.55), 0 0 80px rgba(74, 108, 247, 0.10);
            }
        }

        .btn-link .btn-text {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-link .btn-text::after {
            content: '→';
            display: inline-block;
            transition: transform 0.3s ease;
            font-size: 1.6rem;
            line-height: 1;
        }

        .btn-link:hover .btn-text::after {
            transform: translateX(6px) rotate(-6deg);
        }

        /* ===== 第二个卡片（仙境生存系列）略微精简，无图片 ===== */
        .card-secondary {
            padding: 40px 40px 36px;
            /* 与主卡片风格一致，但无图片 */
        }

        .card-secondary .sub-title {
            margin-bottom: 28px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            body {
                padding: 20px 16px 40px;
                gap: 30px;
            }
            .card {
                padding: 28px 20px 28px;
                border-radius: 32px;
            }
            .card-secondary {
                padding: 28px 20px 28px;
            }
            .main-title {
                font-size: 1.8rem;
            }
            .sub-title {
                font-size: 1.5rem;
            }
            .btn-link {
                padding: 14px 32px;
                font-size: 1.1rem;
                width: 100%;
            }
            .btn-link .btn-text::after {
                font-size: 1.3rem;
            }
            .image-wrapper {
                border-radius: 24px;
            }
            .image-wrapper img {
                border-radius: 24px;
            }
            .image-wrapper::after {
                border-radius: 24px;
            }
            body::before,
            body::after {
                width: 300px;
                height: 300px;
                filter: blur(80px);
            }
        }

        @media (max-width: 400px) {
            .main-title {
                font-size: 1.4rem;
            }
            .sub-title {
                font-size: 1.2rem;
            }
            .btn-link {
                font-size: 0.95rem;
                padding: 12px 20px;
            }
            .card {
                padding: 20px 14px 20px;
                border-radius: 24px;
            }
            .card-secondary {
                padding: 20px 14px 20px;
            }
        }

        /* ===== 减少动画（用户偏好） ===== */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            .card:hover {
                transform: none !important;
            }
            .image-wrapper:hover img {
                transform: none !important;
            }
            .btn-link:hover {
                transform: none !important;
            }
        }
    </style>
</head>

</body>
