<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Windows啥事没有</title>
    <style>
        /* ===== 全局重置 & 字体 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 40px 20px 60px;
            gap: 40px;
            background-image: url('微信图片_20260511210956_45_8.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #0b0e1a;
            position: relative;
            overflow-x: auto;
        }

        /* ===== 卡片样式（完全透明） ===== */
        .card {
            position: relative;
            z-index: 1;
            max-width: 620px;
            width: 100%;
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border-radius: 48px;
            padding: 48px 40px 40px;
            box-shadow:
                0 40px 80px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.10) inset;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.5s ease;
            animation: cardEntrance 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .card:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow:
                0 60px 100px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.15) inset;
        }

        @keyframes cardEntrance {
            0% {
                opacity: 0;
                transform: translateY(60px) scale(0.94);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ===== 标题 ===== */
        .main-title {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #ffffff;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.7), 0 0 10px rgba(0,0,0,0.5);
            margin-bottom: 28px;
            position: relative;
            display: inline-block;
            padding: 0 8px;
        }

        .main-title::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 3px;
            background: linear-gradient(90deg, #ff0000, #00a650, #0078d7, #ffb900);
            border-radius: 4px;
            animation: titleUnderline 3s ease-in-out infinite;
            background-size: 300% 100%;
        }

        @keyframes titleUnderline {
            0% {
                width: 30%;
                opacity: 0.5;
                background-position: 0% 50%;
            }
            50% {
                width: 80%;
                opacity: 1;
                background-position: 100% 50%;
            }
            100% {
                width: 30%;
                opacity: 0.5;
                background-position: 0% 50%;
            }
        }

        /* ===== 副标题（用于并排卡片） ===== */
        .sub-title {
            font-size: 2.0rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: #ffffff;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.7), 0 0 10px rgba(0,0,0,0.5);
            margin-bottom: 28px;
            position: relative;
            display: inline-block;
            padding: 0 8px;
        }

        .sub-title::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            height: 3px;
            border-radius: 4px;
            animation: subUnderline 4s ease-in-out infinite;
            background-size: 300% 100%;
        }

        .card-fairy .sub-title::after {
            background: linear-gradient(90deg, #ffb900, #ff0000, #00a650, #0078d7);
        }
        .card-music .sub-title::after {
            background: linear-gradient(90deg, #0078d7, #ffb900, #ff0000, #00a650);
        }
        .card-chat .sub-title::after {
            background: linear-gradient(90deg, #00a650, #0078d7, #ffb900, #ff0000);
        }

        @keyframes subUnderline {
            0% {
                width: 20%;
                opacity: 0.4;
                background-position: 0% 50%;
            }
            50% {
                width: 70%;
                opacity: 1;
                background-position: 100% 50%;
            }
            100% {
                width: 20%;
                opacity: 0.4;
                background-position: 0% 50%;
            }
        }

        /* ===== 图片容器 ===== */
        .image-wrapper {
            position: relative;
            border-radius: 32px;
            overflow: hidden;
            margin-bottom: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.2);
            transition: box-shadow 0.5s ease;
            animation: imageFloat 6s ease-in-out infinite;
        }

        .image-wrapper:hover {
            box-shadow: 0 30px 70px rgba(0, 120, 215, 0.25);
        }

        @keyframes imageFloat {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        .image-wrapper img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 32px;
            transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1),
                filter 0.6s ease;
            filter: brightness(0.95) saturate(1.05);
            animation: imageFade 1s ease 0.3s both;
        }

        .image-wrapper:hover img {
            transform: scale(1.03);
            filter: brightness(1.03) saturate(1.1);
        }

        @keyframes imageFade {
            0% {
                opacity: 0;
                transform: scale(0.96);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .image-wrapper::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 32px;
            background: linear-gradient(135deg,
                    rgba(255, 0, 0, 0.08) 0%,
                    rgba(0, 166, 80, 0.06) 25%,
                    rgba(0, 120, 215, 0.08) 50%,
                    rgba(255, 185, 0, 0.06) 75%,
                    transparent 100%);
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        .image-wrapper:hover::after {
            opacity: 0.5;
        }

        /* ===== 按钮样式 ===== */
        .btn-link {
            display: inline-block;
            text-decoration: none;
            padding: 18px 48px;
            border-radius: 60px;
            background: linear-gradient(135deg, #ff0000, #00a650, #0078d7, #ffb900);
            background-size: 300% 300%;
            animation: btnGradient 6s ease infinite;
            color: #fff;
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.4s ease;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            cursor: pointer;
            user-select: none;
        }

        @keyframes btnGradient {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .btn-link::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 60px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), transparent 60%);
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .btn-link:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: btnHoverGradient 1.5s ease infinite;
        }

        @keyframes btnHoverGradient {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .btn-link:active {
            transform: scale(0.96);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        .btn-link .btn-text {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-link .btn-text::after {
            content: '→';
            display: inline-block;
            transition: transform 0.3s ease;
            font-size: 1.6rem;
            line-height: 1;
        }

        .btn-link:hover .btn-text::after {
            transform: translateX(6px) rotate(-6deg);
        }

        /* ===== 全局水波涟漪 ===== */
        .ripple-global {
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            pointer-events: none;
            z-index: 9999;
            transform: scale(0);
            animation: rippleGlobalAnim 0.6s ease-out forwards;
        }

        @keyframes rippleGlobalAnim {
            to {
                transform: scale(3);
                opacity: 0;
            }
        }

        /* ===== 并排卡片容器（两列） ===== */
        .row-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            max-width: 1300px;
            width: 100%;
            justify-content: center;
        }

        .row-cards .card {
            flex: 1 1 calc(50% - 30px);
            min-width: 280px;
            max-width: 600px;
            padding: 40px 30px 36px;
        }

        .row-cards .card .sub-title {
            font-size: 1.8rem;
        }
        .row-cards .card .btn-link {
            padding: 14px 32px;
            font-size: 1.2rem;
        }

        /* ===== 聊天室独立卡片（与主卡片同宽） ===== */
        .card-chat-solo {
            max-width: 620px;
            width: 100%;
            padding: 40px 30px 36px;
        }
        .card-chat-solo .sub-title {
            font-size: 2.0rem;
        }
        .card-chat-solo .btn-link {
            padding: 18px 48px;
            font-size: 1.4rem;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .row-cards .card {
                flex: 1 1 100%;
                max-width: 600px;
            }
            .card-chat-solo {
                padding: 28px 20px 28px;
            }
            .card-chat-solo .sub-title {
                font-size: 1.5rem;
            }
            .card-chat-solo .btn-link {
                font-size: 1.1rem;
                padding: 14px 20px;
                width: 100%;
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 20px 16px 40px;
                gap: 30px;
            }
            .card {
                padding: 28px 20px 28px;
                border-radius: 32px;
            }
            .row-cards .card {
                padding: 28px 20px 28px;
            }
            .main-title {
                font-size: 1.8rem;
            }
            .sub-title {
                font-size: 1.5rem;
            }
            .row-cards .card .sub-title {
                font-size: 1.5rem;
            }
            .btn-link {
                padding: 14px 32px;
                font-size: 1.1rem;
                width: 100%;
            }
            .row-cards .card .btn-link {
                font-size: 1.1rem;
                padding: 14px 20px;
            }
            .btn-link .btn-text::after {
                font-size: 1.3rem;
            }
            .image-wrapper {
                border-radius: 24px;
            }
            .image-wrapper img {
                border-radius: 24px;
            }
            .image-wrapper::after {
                border-radius: 24px;
            }
            .card-chat-solo {
                padding: 28px 20px 28px;
            }
            .card-chat-solo .sub-title {
                font-size: 1.5rem;
            }
            .card-chat-solo .btn-link {
                font-size: 1.1rem;
                padding: 14px 20px;
                width: 100%;
            }
        }

        @media (max-width: 400px) {
            .main-title {
                font-size: 1.4rem;
            }
            .sub-title {
                font-size: 1.2rem;
            }
            .row-cards .card .sub-title {
                font-size: 1.2rem;
            }
            .btn-link {
                font-size: 0.95rem;
                padding: 12px 20px;
            }
            .row-cards .card .btn-link {
                font-size: 0.95rem;
                padding: 12px 16px;
            }
            .card {
                padding: 20px 14px 20px;
                border-radius: 24px;
            }
            .row-cards .card {
                padding: 20px 14px 20px;
            }
            .card-chat-solo {
                padding: 20px 14px 20px;
            }
            .card-chat-solo .sub-title {
                font-size: 1.2rem;
            }
            .card-chat-solo .btn-link {
                font-size: 0.95rem;
                padding: 12px 16px;
                width: 100%;
            }
        }

        /* ===== 减少动画 ===== */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            .card:hover {
                transform: none !important;
            }
            .image-wrapper:hover img {
                transform: none !important;
            }
            .btn-link:hover {
                transform: none !important;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 主卡片：Windows啥事没有 ===== -->
    <div class="card">
        <h1 class="main-title">Windows啥事没有</h1>
        <div class="image-wrapper">
            <img src="windowsshashimeiyou.webp" alt="Windows啥事没有" loading="lazy" />
        </div>
        <a href="https://www.douyin.com/user/MS4wLjABAAAASpHTYgJqcLftDkBTflQ7csLPK8XSy3lTel13HCP4kG8lB3YsO3eI3xzDm-PMPsqA?from_tab_name=main" target="_blank" rel="noopener noreferrer" class="btn-link">

        <div class="card card-fairy">

            <a href="https://www.douyin.com/user/self?from_tab_name=main&modal_id=7649312049574563114&showSubTab=compilation" target="_blank" rel="noopener noreferrer" class="btn-link">

        <!-- 音乐歌词系列 -->
        <div class="card card-music">

            </a>
        </div>

    <!-- ===== 聊天室（单独一行） ===== -->
    <div class="card card-chat card-chat-solo">
        <h2 class="sub-title">聊天室</h2>
        <!-- 请将 href="#" 替换为您的真实聊天室链接 -->
        <a href="https://dingdang-chat.fucku.top/" target="_blank" rel="noopener noreferrer" class="btn-link">
            <span class="btn-text">进入聊天室</span>
        </a>
    </div>

    <script>
        (function() {
            // ===== 全局水波涟漪 =====
            function createRipple(x, y) {
                const size = 50;
                const ripple = document.createElement('span');
                ripple.className = 'ripple-global';
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (x - size / 2) + 'px';
                ripple.style.top = (y - size / 2) + 'px';
                document.body.appendChild(ripple);

                setTimeout(() => {
                    if (ripple.parentNode) ripple.remove();
                }, 700);
            }

            document.addEventListener('click', function(e) {
                createRipple(e.clientX, e.clientY);
            });

            // ===== 按钮跳转逻辑 =====
            document.querySelectorAll('.btn-link').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    const href = this.getAttribute('href');
                    if (!href || href === '#' || href === '') {
                        e.preventDefault();
                        return;
                    }
                    e.preventDefault();
                    const target = this.getAttribute('target') || '_self';
                    setTimeout(() => {
                        window.open(href, target);
                    }, 350);
                });
            });
        })();
    </script>
